<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <linearGradient id="topLayer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="midLayer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E5E7EB" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#F59E0B" flood-opacity="0.35" />
    </filter>
  </defs>

  <!-- Background rounded squircle -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <rect width="508" height="508" x="2" y="2" rx="126" stroke="#374151" stroke-width="4" stroke-opacity="0.5" fill="none" />

  <!-- Geometric Stack / Pyramid Logo (Auditflow Emblem) -->
  <g transform="translate(64, 80) scale(16)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bottom Layer -->
    <path d="M2 17l10 5 10-5" stroke="#9CA3AF" fill="none" opacity="0.6" />
    <!-- Middle Layer -->
    <path d="M2 12l10 5 10-5" stroke="url(#midLayer)" fill="none" stroke-width="2.2" />
    <!-- Top Layer (Glow/Active Audit Flow) -->
    <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="url(#topLayer)" fill="#F59E0B" fill-opacity="0.15" filter="url(#glow)" stroke-width="2.4" />
  </g>
</svg>
